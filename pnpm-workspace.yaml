packages:
  - 'site'

overrides:
  '@types/node': 22.8.6

# Single source of truth for the build-script allowlist. A
# `pnpm.onlyBuiltDependencies` block in package.json would OVERRIDE (not merge
# with) this list, so keep everything here — a fresh `pnpm install` (e.g. in
# Docker) enforces it and silently skips any package not listed, breaking
# native builds. Enforced by the no-pnpm-config-in-package-json eslint rule.
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  - eslint-plugin-svelte-stylistic
