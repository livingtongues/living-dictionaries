packages:
  - 'packages/*'
  - site
  - e2e
  - '!packages/ids-import'
  - '!packages/functions'

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
  # Linked workspace package; runs `tsc` via its prepare script to build dist/.
  - svelte-look
  # Required by pnpm 10.26+'s strict-build check during install:
  - supabase
  - unrs-resolver

# Git-hosted packages that need to execute their `prepare` build script.
# pnpm 10.26+ requires explicit allow-listing for git-hosted deps separately
# from the regular onlyBuiltDependencies allowlist. Note: `allowBuilds` is
# a *map*, not a list — pnpm's error message shows the right shape.
allowBuilds:
  eslint-plugin-svelte-stylistic: true
