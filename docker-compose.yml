# LOCAL-TEST mirror only. Production does NOT use this file — the VPS
# docker-compose.yml is GENERATED by `~/code/vps-setup/bin/sync living` from
# `setup/machines/living.conf` + templates (it adds the `web` network, the
# loopback health-check port, the `/opt/hosting/data:/data` mount, etc).
# Keep this in rough parity so `docker compose up --build` here mirrors prod's
# DATA_DIR semantics.
#
# Persistent SQLite lives at the absolute path `/data` inside the container
# (DATA_DIR=/data), mounted from the local `site/.data` for this test. The app
# falls back to `.data` for non-Docker local dev.
services:
  sveltekit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: living-sveltekit
    restart: unless-stopped
    env_file: .env
    environment:
      DATA_DIR: /data
    ports:
      - "127.0.0.1:3050:3000"
    volumes:
      - ./site/.data:/data
