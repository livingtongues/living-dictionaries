<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<script>
		// Pre-paint color-scheme override — keep in sync with $lib/state/dark-mode.ts.
		// Reading localStorage here (before first paint) avoids the flash of the
		// wrong theme for users who forced a scheme opposite their OS. The class
		// goes on <html> so the canvas/overscroll, root scrollbar, and theme.css's
		// `:root:not(.light)` media exclusion all see the override.
		try {
			var color_scheme = localStorage.getItem('color_scheme')
			if (color_scheme === 'light' || color_scheme === 'dark')
				document.documentElement.classList.add(color_scheme)
		}
		catch (_) { }
	</script>
	<link rel='icon' type='image/png' href='%sveltekit.assets%/icons/favicon-32x32_adjusted.png'>
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<!-- Browser-chrome color per scheme (matches theme.css --background; #101014 = hsl(240,11%,7%)).
	     Media-scoped metas follow the OS scheme — a forced in-app override keeps the OS-matched
	     chrome, which is the standard tradeoff. -->
	<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
	<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#101014">
	<link rel='manifest' href='%sveltekit.assets%/manifest.json'>
	<meta name="application-name" content="Living Dictionaries">

	<!-- Add , user-scalable=no for Keyman mobile viewports? -->

	<meta name="mobile-web-app-capable" content="yes">
	<!-- Learn more: https://web.dev/native-hardware-fullscreen -->

	<link rel="mask-icon" href="%sveltekit.assets%/icons/safari-pinned-tab.svg" color="#546e7a">
	<link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/icons/apple-touch-icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<!-- <link rel="apple-touch-startup-image" href="%sveltekit.assets%/icons/apple-touch-startup-image.png"> -->
